<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <!-- Circuit board lines -->
  <line x1="12" y1="32" x2="24" y2="32" stroke="#3b82f6" stroke-width="2"/>
  <line x1="40" y1="32" x2="52" y2="32" stroke="#3b82f6" stroke-width="2"/>
  <line x1="32" y1="12" x2="32" y2="24" stroke="#3b82f6" stroke-width="2"/>
  <line x1="32" y1="40" x2="32" y2="52" stroke="#3b82f6" stroke-width="2"/>
  <!-- Diagonal lines -->
  <line x1="18" y1="18" x2="24" y2="24" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="46" y1="18" x2="40" y2="24" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="18" y1="46" x2="24" y2="40" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="46" y1="46" x2="40" y2="40" stroke="#60a5fa" stroke-width="1.5"/>
  <!-- Center circle -->
  <circle cx="32" cy="32" r="8" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
  <!-- Inner dots -->
  <circle cx="32" cy="32" r="3" fill="#60a5fa"/>
  <!-- Corner nodes -->
  <circle cx="12" cy="32" r="3" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="52" cy="32" r="3" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="32" cy="12" r="3" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="32" cy="52" r="3" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
</svg>
